<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'none'; style-src 'unsafe-inline'; script-src 'unsafe-inline'; img-src 'self' data:;">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #221c50;
      color: #b8c4e0;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      overflow: hidden;
      user-select: none;
      -webkit-app-region: drag;
    }

    /* ── Icon + spinner ── */
    .icon-wrap {
      position: relative;
      width: 88px;
      height: 88px;
      margin-bottom: 30px;
    }

    .app-icon {
      width: 88px;
      height: 88px;
      display: block;
      filter: drop-shadow(0 0 12px rgba(80,140,255,0.35));
    }

    /* SVG spinner ring that orbits the icon */
    .spinner {
      position: absolute;
      inset: -13px;
      width: calc(100% + 26px);
      height: calc(100% + 26px);
      animation: orbit 1.3s linear infinite;
    }
    .spinner-track {
      fill: none;
      stroke: rgba(192,208,255,0.08);
      stroke-width: 2.5;
    }
    .spinner-head {
      fill: none;
      stroke: #c0d0ff;
      stroke-width: 2.5;
      stroke-dasharray: 58 215;
      stroke-linecap: round;
    }

    @keyframes orbit {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }

    /* ── Text ── */
    .label {
      font-size: 10px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: #3e4e72;
      margin-bottom: 6px;
    }

    .title {
      font-size: 22px;
      font-weight: 700;
      color: #eeeeff;
      letter-spacing: 0.04em;
      margin-bottom: 12px;
    }

    .status {
      font-size: 13px;
      color: #647ab0;
      letter-spacing: 0.03em;
      transition: color 0.6s ease, opacity 0.6s ease;
    }

    .status.done {
      color: #60c878;
    }

    /* Fade-in on load */
    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      animation: fadeIn 0.25s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon-wrap">
      <!-- Spinner ring -->
      <svg class="spinner" viewBox="0 0 114 114">
        <circle class="spinner-track" cx="57" cy="57" r="54"/>
        <circle class="spinner-head"  cx="57" cy="57" r="54"/>
      </svg>

      <img class="app-icon" src="icon.png" alt="App Icon" />
    </div>

    <div class="label">Update</div>
    <div class="title">LANTERN</div>
    <div class="status" id="status">Installing update…</div>
  </div>

  <script>
    // Transition status text to mirror the install → launch phases
    setTimeout(() => {
      const el = document.getElementById('status')
      el.style.opacity = '0'
      setTimeout(() => {
        el.textContent = 'Starting Lantern'
        el.classList.add('done')
        el.style.opacity = '1'
      }, 350)
    }, 2200)
  </script>
</body>
</html>
