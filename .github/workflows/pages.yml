name: Deploy GitHub Pages

# Manual web-only redeploy. The automatic web deploy on every release lives in the
# "Tag and Release" workflow (the `pages` job) so the PWA is stamped with the same
# version tag as the desktop build. This manual run stamps from the latest tag too.
on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false   # never cancel an in-progress Pages deploy

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # need the tags to stamp the version

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # Skip Electron's ~100MB binary download — the web build doesn't need it.
      - name: Install dependencies
        run: npm ci
        env:
          ELECTRON_SKIP_BINARY_DOWNLOAD: 1

      # Match the desktop: stamp package.json from the latest release tag so the PWA
      # reports the same version. (Releases deploy via the release workflow; this is
      # for manual re-deploys.)
      - name: Stamp version from latest release tag
        run: |
          git fetch --tags --force
          TAG=$(git tag -l "v*" --sort=-version:refname | head -1)
          if [ -n "$TAG" ]; then echo "Stamping web build as $TAG"; npm version "$TAG" --no-git-tag-version --allow-same-version; fi

      # Builds the PWA into docs/app (git-ignored; produced fresh here). The server
      # URL defaults to the Railway host; the gateway token comes from a secret so
      # it isn't committed. Add it under Settings → Secrets → Actions.
      - name: Build web client
        run: npm run web:build
        env:
          VITE_MAGILOOM_TOKEN: ${{ secrets.MAGILOOM_WEB_TOKEN }}
          # Not a secret — a feature flag baked into the bundle. Must match the
          # server's MAGILOOM_REQUIRE_ACCOUNT so the mandatory sign-in gate lines up
          # with the server actually rejecting anonymous connections.
          VITE_MAGILOOM_REQUIRE_ACCOUNT: "1"

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
